<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-emoji/dist/markdown-it-emoji.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists/dist/markdown-it-task-lists.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath/texmath.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it-texmath/css/texmath.min.css">

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        /* --- Variables & Theming --- */
        :root {
            --code-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --bg-color: #ffffff;
            --text-color: #24292e;
            --panel-bg: #f6f8fa;
            --border-color: #e1e4e8;
            --btn-bg: #24292e;
            --btn-text: #ffffff;
            --accent-color: #0078D4;
            --drop-bg: rgba(0, 120, 212, 0.05);
        }

        [data-theme="dark"] {
            --bg-color: #1F1F1F;
            --text-color: #CCCCCC;
            --panel-bg: #181818;
            --border-color: #2B2B2B;
            --btn-bg: #FFFFFF;
            --btn-text: #000000;
            --accent-color: #0078D4;
            --drop-bg: rgba(0, 120, 212, 0.15);
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--code-font-family);
            margin: 0;
            padding: 0;
            transition: background-color 0.15s, color 0.15s;
        }

        /* --- Header & Controls --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .title {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-select-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .theme-toggle {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: opacity 0.1s;
        }

        .theme-toggle:hover {
            opacity: 0.9;
        }

        /* --- Layout --- */
        .layout {
            display: grid;
            grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
            gap: 32px;
            align-items: start;
            max-width: 1200px;
            margin: 50px auto 0;
            padding: 40px 24px;
        }

        /* --- Table of Contents --- */
        #toc {
            position: sticky;
            top: 80px;
            align-self: start;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--panel-bg);
        }

        #toc .toc-title {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin: 0 0 12px;
            opacity: 0.8;
        }

        #toc ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #toc a {
            display: block;
            color: var(--text-color);
            text-decoration: none;
            border-left: 2px solid transparent;
            padding: 6px 8px;
            border-radius: 0 6px 6px 0;
            line-height: 1.4;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.15s, border-color 0.15s, color 0.15s;
        }

        #toc a:hover {
            background: rgba(127, 127, 127, 0.12);
        }

        #toc a.active {
            border-left-color: var(--accent-color);
            background: rgba(0, 120, 212, 0.12);
            color: var(--text-color);
            font-weight: 600;
        }

        #toc a.active.is-pulsing {
            animation: toc-highlight 320ms ease-out;
        }

        @keyframes toc-highlight {
            0% {
                transform: translateX(0);
            }

            45% {
                transform: translateX(4px);
            }

            100% {
                transform: translateX(0);
            }
        }

        #toc .toc-level-2 {
            padding-left: 0px;
        }

        #toc .toc-level-3 {
            padding-left: 16px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* --- Viewer & Markdown Content --- */
        #viewer {
            max-width: 850px;
            width: 100%;
            line-height: 1.6;
        }

        .code-body a {
            color: var(--accent-color) !important;
            text-decoration: underline var(--accent-color) !important;
            text-underline-offset: 4px;
        }

        .code-body blockquote {
            background-color: var(--panel-bg);
            border-left: 4px solid var(--border-color);
            padding: 8px 16px;
            margin: 16px 0;
        }

        #viewer pre {
            background-color: var(--panel-bg) !important;
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
        }

        .mermaid {
            background: transparent !important;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        code {
            font-family: "SFMono-Regular", Consolas, monospace;
        }

        .code-body h2.is-flashing,
        .code-body h3.is-flashing {
            animation: title-flash 1.5s ease-out;
        }

        @keyframes title-flash {
            0% {
                background-color: rgba(0, 120, 212, 0.4);
                padding-left: 8px;
                border-radius: 4px;
            }

            100% {
                background-color: transparent;
                padding-left: 0px;
            }
        }

        /* --- Components (Dropzone & Loading) --- */
        #dropZone {
            border: 2px dashed var(--border-color);
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            border-radius: 8px;
            background-color: var(--panel-bg);
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        #dropZone.dragover {
            border-color: var(--accent-color);
            background-color: var(--drop-bg);
        }

        .loading-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-color);
            opacity: 0.7;
            font-size: 1.1rem;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <script>
        // Blocking script to prevent flash of unstyled content (FOUC)
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <header>
        <div class="title" id="appTitle">📄 Markdown Viewer</div>
        <div class="controls">
            <input type="file" id="fileInput" accept=".md,.txt" style="display: none;">
            <button class="file-select-btn" onclick="document.getElementById('fileInput').click()">Open File</button>
            <button class="theme-toggle" id="themeBtn">🌙 Dark Mode</button>
        </div>
    </header>

    <main class="layout">
        <aside id="toc" aria-label="Table of Contents"></aside>
        <section id="viewer" class="code-body">
            <div id="dropZone">
                <h3>Drag & Drop Markdown file here</h3>
                <p>Or select from "Open File"</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { codeToHtml } from 'https://esm.sh/shiki@4.2.0';
        import markdownItAnchor from 'https://esm.sh/markdown-it-anchor';

        /* --- Global Variables --- */
        let markdownText = '';
        let currentTheme = 'light';
        let activeTocLink = null;
        let scrollSyncHandler = null;
        let isProgrammaticScrolling = false;
        let scrollTimeout = null;
        const shikiThemes = { light: 'github-light', dark: 'dark-plus' };

        /* --- DOM Elements --- */
        const themeBtn = document.getElementById('themeBtn');
        const fileInput = document.getElementById('fileInput');
        const appTitle = document.getElementById('appTitle');

        /* --- Markdown-It Initialization --- */
        const md = window.markdownit({ html: true, linkify: true, breaks: true });
        md.use(window.markdownitEmoji);
        md.use(window.markdownitTaskLists, { label: true });
        md.use(markdownItAnchor, {
            level: [2, 3],
            slugify: (heading) => heading.trim().toLowerCase()
                .replace(/\s+/g, '-')
                .replace(/[^\w\-./\u3040-\u30ff\u4e00-\u9fff]+/g, '')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '')
        });
        md.use(window.texmath, { engine: window.katex, delimiters: 'dollars' });

        /* --- Theme Management --- */
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) currentTheme = savedTheme;
            else currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            applyTheme(currentTheme);
        }

        function applyTheme(theme) {
            const isDark = theme === 'dark';
            // 💡 属性を削除するのではなく、常に 'dark' か 'light' をセットする
            document.documentElement.setAttribute('data-theme', theme);

            if (isDark) {
                themeBtn.textContent = '☀️ Light Mode';
            } else {
                themeBtn.textContent = '🌙 Dark Mode';
            }
            configureCodeMermaid(isDark);
            localStorage.setItem('theme', theme);
        }

        themeBtn.addEventListener('click', async () => {
            currentTheme = (currentTheme === 'light') ? 'dark' : 'light';
            applyTheme(currentTheme);
            if (markdownText) await renderMarkdown();
        });

        /* --- Table of Contents Management --- */
        function generateToc(viewer) {
            const toc = document.getElementById('toc');
            const headings = Array.from(viewer.querySelectorAll('h2, h3'));
            if (!headings.length) {
                toc.innerHTML = '<p class="toc-title">Contents</p><p style="font-size:0.85rem;opacity:0.7;">No headings found</p>';
                return [];
            }
            const items = headings.map((heading) => {
                const level = Number(heading.tagName.slice(1));
                const id = heading.id;
                const text = heading.textContent.trim();
                return `<li class="toc-level-${level}"><a href="#${id}" data-target-id="${id}">${text}</a></li>`;
            });
            toc.innerHTML = `<p class="toc-title">Contents</p><ul>${items.join('')}</ul>`;
            return headings;
        }

        function scrollHeadingToViewportAnchor(targetHeading, viewportRatio = 0.3) {
            const desiredTopFromViewport = window.innerHeight * viewportRatio;
            const targetTop = window.scrollY + targetHeading.getBoundingClientRect().top;
            let scrollTop = Math.max(0, targetTop - desiredTopFromViewport);
            const maxScrollTop = document.documentElement.scrollHeight - window.innerHeight;
            if (scrollTop > maxScrollTop) scrollTop = maxScrollTop;

            isProgrammaticScrolling = true;

            if (Math.abs(window.scrollY - scrollTop) < 1) {
                const fakeScrollTarget = window.scrollY >= maxScrollTop ? window.scrollY - 1 : window.scrollY + 1;
                window.scrollTo({ top: fakeScrollTarget, behavior: 'auto' });
                setTimeout(() => { window.scrollTo({ top: scrollTop, behavior: 'smooth' }); }, 50);
            } else {
                window.scrollTo({ top: scrollTop, behavior: 'smooth' });
            }
        }

        document.getElementById('toc').addEventListener('click', (event) => {
            const link = event.target.closest('a[data-target-id]');
            if (!link) return;
            const targetId = link.dataset.targetId;
            const targetHeading = document.getElementById(targetId);
            if (!targetHeading) return;

            event.preventDefault();
            updateActiveTocLink(targetId);
            scrollHeadingToViewportAnchor(targetHeading, 0.3);

            const triggerFlash = () => {
                targetHeading.classList.remove('is-flashing');
                void targetHeading.offsetWidth;
                targetHeading.classList.add('is-flashing');
                setTimeout(() => { targetHeading.classList.remove('is-flashing'); }, 1000);
            };

            const desiredTop = window.scrollY + targetHeading.getBoundingClientRect().top - (window.innerHeight * 0.3);
            if (Math.abs(window.scrollY - desiredTop) < 2) {
                triggerFlash();
                return;
            }

            const onScrollEnd = () => {
                triggerFlash();
                window.removeEventListener('scrollend', onScrollEnd);
            };
            window.addEventListener('scrollend', onScrollEnd);
        });

        function updateActiveTocLink(id) {
            const nextActive = document.querySelector(`#toc a[data-target-id="${CSS.escape(id)}"]`);
            if (!nextActive || nextActive === activeTocLink) return;

            if (activeTocLink) {
                activeTocLink.classList.remove('active');
                activeTocLink.classList.remove('is-pulsing');
            }

            nextActive.classList.add('active');
            void nextActive.offsetWidth;
            nextActive.classList.add('is-pulsing');
            activeTocLink = nextActive;
            nextActive.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function setupScrollSpy(headings) {
            if (scrollSyncHandler) {
                window.removeEventListener('scroll', scrollSyncHandler);
                window.removeEventListener('resize', scrollSyncHandler);
                scrollSyncHandler = null;
            }
            activeTocLink = null;
            if (!headings.length) return;

            function syncActiveHeading() {
                if (isProgrammaticScrolling) return;
                const triggerLine = window.innerHeight * 0.3;
                const current = headings.reduce((closest, heading) => {
                    const box = heading.getBoundingClientRect();
                    if (box.top <= triggerLine) {
                        if (!closest || box.top > closest.getBoundingClientRect().top) return heading;
                    }
                    return closest;
                }, null);

                if (current) updateActiveTocLink(current.id);
                else if (headings.length > 0) updateActiveTocLink(headings[0].id);
            }

            scrollSyncHandler = () => {
                window.requestAnimationFrame(syncActiveHeading);
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => { isProgrammaticScrolling = false; }, 100);
            };
            window.addEventListener('scroll', scrollSyncHandler, { passive: true });
            window.addEventListener('resize', scrollSyncHandler);
            syncActiveHeading();
        }

        /* --- Rendering Logic --- */
        function configureCodeMermaid(isDark) {
            mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: isDark ? 'dark' : 'default' });
        }

        async function renderMarkdown() {
            const viewer = document.getElementById('viewer');
            if (!markdownText) return;

            viewer.innerHTML = md.render(markdownText);

            const codeBlocks = viewer.querySelectorAll('pre code');
            const tasks = [];

            for (const codeEl of codeBlocks) {
                const preEl = codeEl.parentElement;
                if (!preEl) continue;

                const codeText = codeEl.textContent;
                const lang = (codeEl.className || '').match(/language-(\w+)/)?.[1] || 'text';

                if (lang === 'mermaid') {
                    const mermaidDiv = document.createElement('div');
                    mermaidDiv.className = 'mermaid';
                    mermaidDiv.textContent = codeText;
                    preEl.replaceWith(mermaidDiv);
                } else {
                    tasks.push((async () => {
                        try {
                            const html = await codeToHtml(codeText, { lang, theme: shikiThemes[currentTheme] });
                            const wrapper = document.createElement('div');
                            wrapper.innerHTML = html;
                            preEl.replaceWith(wrapper.firstElementChild);
                        } catch (e) { console.error(e); }
                    })());
                }
            }

            await Promise.all(tasks);
            const headings = generateToc(viewer);

            try {
                await mermaid.run({ nodes: viewer.querySelectorAll('.mermaid') });
            } catch (e) {
                console.error("Mermaid Error:", e);
            }

            setupScrollSpy(headings);
        }

        /* --- File Handling --- */
        async function loadContent(text, title = "Markdown Viewer") {
            markdownText = text;
            appTitle.textContent = `📄 ${title}`;
            window.scrollTo(0, 0);
            await renderMarkdown();
        }

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => loadContent(e.target.result, file.name);
            reader.readAsText(file);
        }

        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function setupDragAndDrop() {
            window.addEventListener('dragover', (e) => e.preventDefault());
            window.addEventListener('drop', (e) => e.preventDefault());

            const dropZone = document.getElementById('dropZone');
            if (!dropZone) return;

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFile(e.dataTransfer.files[0]);
            });
            dropZone.addEventListener('click', () => fileInput.click());
        }

        /* --- Initialization --- */
        async function init() {
            const hasDark = document.documentElement.getAttribute('data-theme') === 'dark';
            currentTheme = hasDark ? 'dark' : 'light';
            themeBtn.textContent = hasDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            configureCodeMermaid(hasDark);

            setupDragAndDrop();

            // 1. セッションストレージから復号データを取り出す
            const sessionText = sessionStorage.getItem("decrypted_md_text");
            const sessionTitle = sessionStorage.getItem("decrypted_md_title") || "Decrypted File";

            if (sessionText) {
                // 読み込んだらストレージを綺麗に空にする（メモリ解放＆セキュリティ対策）
                sessionStorage.removeItem("decrypted_md_text");
                sessionStorage.removeItem("decrypted_md_title");

                await loadContent(sessionText, sessionTitle);
                return; // 処理完了
            }
            // --- ここまで修正 ---

            const params = new URLSearchParams(window.location.search);
            const fileUrl = params.get('file') || params.get('url');

            if (fileUrl) {
                const viewer = document.getElementById('viewer');
                viewer.innerHTML = `
                    <div class="loading-box">
                        <div class="spinner"></div>
                        <div>Loading...</div>
                    </div>
                `;

                try {
                    const response = await fetch(fileUrl);
                    if (!response.ok) throw new Error('Failed to fetch the file.');
                    const text = await response.text();
                    const filename = fileUrl.split('/').pop();
                    await loadContent(text, filename);
                } catch (error) {
                    viewer.innerHTML = `
                    <p style="color:red; font-weight:bold;">Error: ${error.message}</p>
                    <p style="font-size:0.85rem; opacity:0.8;">If specifying a local file directly, please start a local server (like Live Server) to bypass CORS restrictions.</p>`;

                    setTimeout(() => {
                        viewer.innerHTML += `<div id="dropZone"><h3>Or drag & drop a file here</h3></div>`;
                        setupDragAndDrop();
                    }, 500);
                }
            }
        }

        // Start Application
        init();
    </script>
</body>

</html>
